<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Product Intelligence</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#02060b;
font-family:'Orbitron',sans-serif;
overflow:hidden;
color:#00f7ff;
}

model-viewer{
width:100vw;
height:100vh;
background:#02060b;
}

.hud{
position:absolute;
top:15px;
left:15px;
width:260px;
padding:15px;
background:rgba(0,0,0,.45);
border:1px solid rgba(0,247,255,.4);
backdrop-filter:blur(8px);
z-index:100;
}

.title{
font-size:16px;
letter-spacing:2px;
color:white;
margin-bottom:12px;
}

#typing{
font-size:12px;
line-height:1.8;
white-space:pre-line;
}

.recommendation{
margin-top:10px;
padding-top:10px;
border-top:1px solid rgba(0,247,255,.25);
}

.rec{
font-size:22px;
font-weight:700;
text-shadow:0 0 15px #00f7ff;
}

.status{
position:absolute;
top:15px;
right:15px;
padding:8px 12px;
border:1px solid rgba(0,247,255,.4);
background:rgba(0,0,0,.35);
font-size:10px;
letter-spacing:2px;
z-index:100;
}

.radar{
position:absolute;
bottom:20px;
right:20px;
width:70px;
height:70px;
border:1px solid rgba(0,247,255,.5);
border-radius:50%;
animation:spin 6s linear infinite;
z-index:100;
}

.radar:before{
content:"";
position:absolute;
left:50%;
top:50%;
width:2px;
height:30px;
background:#00f7ff;
transform-origin:bottom center;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

#arButton{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
border:none;
background:#00f7ff;
font-weight:bold;
cursor:pointer;
z-index:200;
}

</style>
</head>

<body>

<model-viewer
id="viewer"
src="Sneakers.glb"
camera-controls
auto-rotate
shadow-intensity="1"
ar
ar-modes="scene-viewer webxr quick-look"
camera-orbit="0deg 75deg 105%"
field-of-view="30deg">

<button slot="ar-button" id="arButton">
VIEW IN AR
</button>

</model-viewer>

<div class="status">
SYSTEM ONLINE
</div>

<div class="hud">

<div class="title">
PRODUCT INTELLIGENCE
</div>

<div id="typing"></div>

<div class="recommendation">
Recommendation
<div class="rec">HIGH</div>
</div>

</div>

<div class="radar"></div>

<script>

const text = `
Product : Sneakers
Color : Black
Size : 7, 8, 9, 10
Status : Available
`;

let i = 0;

function typeEffect(){
const target = document.getElementById("typing");

if(i < text.length){
target.innerHTML += text.charAt(i);
i++;
setTimeout(typeEffect,15);
}
}

window.onload = typeEffect;

</script>

</body>
</html>
